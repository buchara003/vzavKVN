name: Update HAPP VPN Subscriptions

on:
  schedule:
    - cron: '0 4 * * *'   # каждый день в \~7:00 по Москве
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Download HAPP decoder
        run: |
          curl -L -o decoder \
            https://github.com/amurcanov/happ-decrypt-universal/releases/download/v1.0.0/linux-x64_x86 || \
            echo "Не удалось скачать decoder"
          chmod +x decoder || true

      - name: Scrape & Decode
        run: |
          curl -s -H "User-Agent: Mozilla/5.0" "https://t.me/s/happvpn" -o channel.html

          # Более точный поиск crypt5 ссылок
          grep -oE 'happ://crypt5/[A-Za-z0-9+/=]+' channel.html | tail -n 6 > links.txt

          echo "=== Обновление от $(date) ===" > sobr.txt
          echo "Найдено ссылок: $(wc -l < links.txt)" >> sobr.txt
          echo "" >> sobr.txt

          if [ ! -f decoder ]; then
            echo "Decoder не скачался! Используем запасной метод." >> sobr.txt
          else
            while IFS= read -r link || [ -n "$link" ]; do
              if [[ $link == happ://crypt5/* ]]; then
                echo "🔓 Расшифровываем: ${link:0:60}..." >> sobr.txt
                ./decoder "$link" >> sobr.txt 2>&1 || echo "Ошибка декодирования" >> sobr.txt
                echo -e "\n----------------------------------------\n" >> sobr.txt
              fi
            done < links.txt
          fi

          echo "Готово. Последнее обновление: $(date)" >> sobr.txt

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sobr.txt
          if git diff --staged --quiet; then
            echo "Нет изменений"
          else
            git commit -m "Автообновление подписок $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
