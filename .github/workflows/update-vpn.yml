name: Update VPN Subs from Gists

permissions:
  contents: write

on:
  schedule:
    - cron: '0 10 * * *'    # 13:00 по Москве (UTC+3)
    - cron: '0 17 * * *'    # 20:00 по Москве
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Combine all gists into one subscription
        run: |
          USER="tghappcluchi"
          
          echo "# Combined VPN Subscription from @tghappcluchi" > subscriptions.txt
          echo "# Last update: $(date -u +'%Y-%m-%d %H:%M UTC')" >> subscriptions.txt
          echo "" >> subscriptions.txt
          
          # Берём последние 4 гиста и сразу обрабатываем
          curl -s "https://api.github.com/users/$USER/gists?per_page=4" | \
          jq -r '.[].files | to_entries[] | .value.raw_url' | while read -r raw_url; do
            if [ -n "$raw_url" ]; then
              echo "→ Fetching: $raw_url"
              echo "=== New configs from gist ===" >> subscriptions.txt
              curl -s "$raw_url" >> subscriptions.txt
              echo -e "\n\n" >> subscriptions.txt
            fi
          done

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update combined VPN subscription from gists"
