name: Update bokGt from po5p/TgBot

permissions:
  contents: write

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Объединить все подписки из users/ в bokGt
        run: |
          echo "# bokGt — Объединённые подписки" > bokGt
          echo "# Источник: https://github.com/po5p/TgBot/tree/main/users" >> bokGt
          echo "# Обновлено: $(date -u +'%Y-%m-%d %H:%M UTC')" >> bokGt
          echo "" >> bokGt

          # Получаем рекурсивное дерево файлов (включая вложенные папки)
          curl -s "https://api.github.com/repos/po5p/TgBot/git/trees/main?recursive=1" > tree.json

          # Находим все .txt файлы внутри папки users/
          jq -r '
            .tree[] | 
            select(.type == "blob" and (.path | startswith("users/") and endswith(".txt")))
            | "https://raw.githubusercontent.com/po5p/TgBot/main/" + .path
          ' tree.json > urls.txt

          echo "# Всего файлов найдено: $(wc -l < urls.txt)" >> bokGt
          echo "" >> bokGt

          # Скачиваем содержимое каждого файла
          while read -r url; do
            if [ -n "$url" ]; then
              filename=$(basename "$url")
              echo "→ Добавляем: $filename"
              curl -s "$url" >> bokGt
              echo "" >> bokGt
            fi
          done < urls.txt

          echo "✅ Готово! Строк в bokGt: $(wc -l < bokGt)"

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление bokGt $(date -u +'%Y-%m-%d %H:%M UTC')"
