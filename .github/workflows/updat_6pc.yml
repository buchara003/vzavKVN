name: Update 6pc from po5p/hpc

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * *'     # 06:00 по Москве
    - cron: '0 15 * * *'    # 18:00 по Москве
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Объединить все txt в 6pc
        run: |
          echo "# Объединённые подписки 6pc" > 6pc
          echo "# Источник: po5p/hpc" >> 6pc
          echo "# Последнее обновление: $(date -u +'%Y-%m-%d %H:%M UTC')" >> 6pc
          echo "" >> 6pc

          # Получаем список всех .txt файлов из репозитория
          curl -s "https://api.github.com/repos/po5p/hpc/contents" > repo.json

          jq -r '.[] | select(.type == "file" and .name | endswith(".txt")) | .download_url' repo.json | while read -r url; do
            if [ -n "$url" ]; then
              filename=$(basename "$url")
              echo "→ Скачиваем: $filename"
              echo -e "\n# === $filename ===" >> 6pc
              curl -s "$url" >> 6pc
              echo -e "\n" >> 6pc
            fi
          done

          echo "Готово! Всего строк в 6pc: $(wc -l < 6pc)"

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление 6pc $(date -u +'%Y-%m-%d %H:%M UTC')"
