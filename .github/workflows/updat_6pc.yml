name: Update 6pc from po5p/hpc

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * *'     # 06:00 МСК
    - cron: '0 15 * * *'    # 18:00 МСК
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Объединить все подписки в один файл 6pc
        run: |
          echo "# 6pc — Объединённые подписки" > 6pc
          echo "# Источник: https://github.com/po5p/hpc" >> 6pc
          echo "# Обновлено: $(date -u +'%Y-%m-%d %H:%M UTC')" >> 6pc
          echo "# Всего файлов: $(curl -s https://api.github.com/repos/po5p/hpc/contents | jq '.[] | select(.type == "file" and (.name | endswith(".txt"))) | length')" >> 6pc
          echo "" >> 6pc
          echo "" >> 6pc

          # Скачиваем содержимое всех .txt и просто склеиваем
          curl -s "https://api.github.com/repos/po5p/hpc/contents" | \
          jq -r '.[] | select(.type == "file" and (.name | endswith(".txt"))) | .download_url' | \
          while read -r url; do
            if [ -n "$url" ]; then
              curl -s "$url" >> 6pc
              echo "" >> 6pc          # пустая строка между файлами
            fi
          done

          echo "✅ Готово! Строк в 6pc: $(wc -l < 6pc)"

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автообновление 6pc $(date -u +'%Y-%m-%d %H:%M UTC')"
